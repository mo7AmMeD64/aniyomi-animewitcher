name: Build AnimeWitcher APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI_CHUNK_SIZE: 65
      CI_CHUNK_NUM: 0

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: aniyomi-animewitcher

      - name: Checkout aniyomi-extensions base
        uses: actions/checkout@v4
        with:
          repository: aniyomiorg/aniyomi-extensions
          path: aniyomi-extensions
          fetch-depth: 1

      - name: Copy extension into base project
        run: |
          mkdir -p aniyomi-extensions/src/ar/AnimeWitcher
          cp -r aniyomi-animewitcher/src/ar/AnimeWitcher/. \
            aniyomi-extensions/src/ar/AnimeWitcher/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        working-directory: aniyomi-extensions
        run: |
          chmod +x gradlew
          ./gradlew :src:ar:AnimeWitcher:assembleRelease

      - name: Find APK path
        id: apk
        working-directory: aniyomi-extensions
        run: |
          APK=$(find . -name "*.apk" -path "*/AnimeWitcher/*" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "APK found: $APK"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimeWitcher-APK
          path: aniyomi-extensions/${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AnimeWitcher v${{ github.run_number }}
          files: aniyomi-extensions/${{ steps.apk.outputs.path }}
          body: |
            ## AnimeWitcher — Aniyomi Extension
            ### التثبيت في Aniyomi
            1. حمّل ملف APK من الأسفل
            2. افتح Aniyomi ← Browse ← Extensions
            3. اضغط أيقونة الملف ← اختر الـ APK
            ### API
            https://1we323-witcher.hf.space
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
